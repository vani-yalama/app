<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="customer-bg">

<div class="container">

  <!-- Delivery Time -->
  <div class="card">
    <p><strong>Estimated Delivery:</strong> 25–30 minutes</p>
  </div>

  <!-- Cart Items -->
  <div class="card">
    <h3>Cart Items</h3>

    <div class="flex" style="justify-content: space-between; align-items:center;">
      <p>Milk</p>
      <p>₹50</p>
      <div class="flex">
        <button class="btn btn-secondary">-</button>
        <span>1</span>
        <button class="btn btn-secondary">+</button>
      </div>
    </div>

    <div class="flex" style="justify-content: space-between; align-items:center; margin-top: 10px;">
      <p>Rice</p>
      <p>₹80</p>
      <div class="flex">
        <button class="btn btn-secondary">-</button>
        <span>2</span>
        <button class="btn btn-secondary">+</button>
      </div>
    </div>

  </div>

  <!-- Add Items -->
  <div class="card center">
    <button class="btn btn-secondary" onclick="goToHome()">Add Items</button>
  </div>

  <!-- Discounts -->
  <div class="card">
    <h3>Offers & Discounts</h3>
    <p>Flat ₹20 off applied</p>
  </div>

  <!-- Price Summary -->
  <div class="card">
    <p>Subtotal: ₹210</p>
    <p>Discount: -₹20</p>
    <p><strong>Total: ₹190</strong></p>
  </div>

  <!-- Checkout -->
  <div class="card center">
    <button class="btn btn-primary">Proceed to Checkout</button>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="navbar" style="position: fixed; bottom: 0; width: 95%; left: 2.5%;">
  <div class="flex" style="justify-content: space-around;">
    <div onclick="goToHome()">🏠</div>
    <div>🛒</div>
    <div onclick="goToReorder()">🔁</div>
    <div onclick="goToAccount()">👤</div>
  </div>
</div>

<script src="../js/app.js"></script>

</body>
</html>
