<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer Home</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">

    <!-- Address -->
    <div class="box">
        <p>🏠 Deliver to: Home</p>
    </div>

    <!-- Search -->
    <div class="box">
        <input type="text" id="searchInput" placeholder="Search items..." onkeyup="searchItems()">
    </div>

    <!-- Offers -->
    <div class="box">
        <h3>Offers</h3>
        <div class="chips">
            <span>10% off</span>
            <span>Flat ₹50 off</span>
            <span>Buy 1 Get 1</span>
        </div>
    </div>

    <!-- Categories -->
    <div class="box">
        <h3>What's on your mind?</h3>
        <div class="chips">
            <span>Grocery</span>
            <span>Pharmacy</span>
            <span>Electronics</span>
            <span>Clothing</span>
        </div>
    </div>

    <!-- Items -->
    <div class="box">
        <h3>Popular Items</h3>

        <div class="items">

            <div class="item">
                <h4>Milk</h4>
                <p>₹50</p>
                <button onclick="addToCart('Milk',50)">Add to Cart</button>
            </div>

            <div class="item">
                <h4>Rice</h4>
                <p>₹60</p>
                <button onclick="addToCart('Rice',60)">Add to Cart</button>
            </div>

            <div class="item">
                <h4>Bread</h4>
                <p>₹40</p>
                <button onclick="addToCart('Bread',40)">Add to Cart</button>
            </div>

        </div>
    </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <div>🏠</div>
    <div onclick="goToCart()">🛒</div>
    <div>🔄</div>
    <div>👤</div>
</div>

<script src="../js/script.js"></script>

</body>
</html>
