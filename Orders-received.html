<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders Received</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="store-bg">

<button class="sidebar-toggle">Menu</button>

<div class="flex">

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Stock</a>
    <a href="#">Orders</a>
    <a href="#">Account</a>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Header -->
    <div class="card">
      <h2>Orders Received</h2>
    </div>

    <!-- Order 1 -->
    <div class="card">
      <p><strong>Milk</strong></p>
      <p>Quantity: 2</p>
      <p>Price: ₹100</p>
      <p>Address: 123 Main Street, Bangalore</p>

      <div class="flex" style="margin-top:10px;">
        <button class="btn btn-primary">Accept</button>
        <button class="btn btn-secondary">Reject</button>
      </div>
    </div>

    <!-- Order 2 -->
    <div class="card">
      <p><strong>Rice</strong></p>
      <p>Quantity: 1</p>
      <p>Price: ₹80</p>
      <p>Address: 456 Park Road, Bangalore</p>

      <div class="flex" style="margin-top:10px;">
        <button class="btn btn-primary">Accept</button>
        <button class="btn btn-secondary">Reject</button>
      </div>
    </div>

  </div>

</div>

<script src="../js/app.js"></script>

</body>
</html>
