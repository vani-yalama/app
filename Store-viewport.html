<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Account</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="store-bg">

<button class="sidebar-toggle">Menu</button>

<div class="flex">

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">Dashboard</a>
    <a href="#">Stock</a>
    <a href="#">Orders</a>
    <a href="#">Account</a>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Header -->
    <div class="card">
      <h2>Store Account</h2>
    </div>

    <!-- Store Details -->
    <div class="card">
      <p><strong>Store Name:</strong> ABC Store</p>
      <p><strong>Owner Name:</strong> John Doe</p>
      <p><strong>Phone:</strong> 9876543210</p>
      <p><strong>Email:</strong> store@email.com</p>
      <p><strong>Address:</strong> 123 Main Street, Bangalore</p>
    </div>

    <!-- Edit -->
    <div class="card center">
      <button class="btn btn-secondary" onclick="editStoreDetails()">Edit Details</button>
    </div>

    <!-- Options -->
    <div class="card">
      <div class="flex" style="flex-direction: column;">
        <div class="card" onclick="goToOrders()">📦 Orders</div>
        <div class="card" onclick="goToStockAlerts()">⚠️ Stock Alerts</div>
        <div class="card">🔐 Change Password</div>
      </div>
    </div>

    <!-- Logout -->
    <div class="card center">
      <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script src="../js/app.js"></script>

</body>
</html>
